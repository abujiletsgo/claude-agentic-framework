# Multi-Model Tier Configuration
# Balanced: Opus for coordination/architecture, Sonnet for capable workhorse tasks,
# Haiku for mechanical/validation. Optimized for token efficiency.

default_model: sonnet

# ─── Tier Definitions ───────────────────────────────────────────────

tiers:
  opus:
    model_id: claude-opus-4-6
    use_for:
      - Orchestration, planning, architecture
      - Complex multi-step coordination
      - Recursive exploration controllers
      - Multi-agent coordination requiring strategic decisions

  sonnet:
    model_id: claude-sonnet-4-6
    max_turns_default: 25  # Cap for research/analysis agents; builder=20
    use_for:
      - Research and analysis (context-first, 25 turns max)
      - Code generation and implementation (20 turns max)
      - Code review and refactoring
      - Security analysis
      - Agent/skill generation
      - Codebase scouting and reporting
      - Critical analysis
      - Code research and codebase analysis (Wave 0 researchers — reasoning required)

  haiku:
    model_id: claude-haiku-4-5
    use_for:
      - Read-only validation (syntax checks, linting)
      - Fast file exploration (Explore agent)
      - Documentation scraping
      - Data formatting and mechanical transforms
      - Status reporting and TTS summaries
      - Researcher for mechanical listings only (file inventories, not code analysis)

# ─── Agent Assignments ──────────────────────────────────────────────
# 2 Opus, 18 Sonnet, 4 Haiku
# Consultant model: Wave 0a = user ↔ consultants, Wave 0b = researchers, Wave 1 = builders, Wave 2 = QA loop

agent_tiers:
  opus:
    - orchestrator            # Multi-agent coordination and planning
    - project-architect       # Architecture design, agent ecosystem creation

  sonnet:
    - po                      # Product Owner — consultation facilitator, spec synthesizer
    - critical-analyst        # Critical thinking, risk analysis
    - researcher              # Research and analysis
    - meta-agent              # Agent file generation
    - scout-report-suggest    # Codebase scouting
    - builder                 # Pure implementation
    - debugger                # Root cause analysis + fix plan writing
    - onboard-builder         # Wave 1 onboarding — generates project files from plan
    - onboard-planner         # Wave 0 onboarding — detects stack, writes plan
    - academic-researcher     # Academic paper search and citation graph traversal
    - code-researcher         # Cross-repo code pattern search via GitHub MCP
    # ── Domain consultants (Wave 0a — read-only, interactive, spec producers) ──
    - frontend-consultant     # UI, UX, components — asks questions, produces frontend spec
    - backend-consultant      # API, data, services — asks questions, produces backend spec
    - architecture-consultant # System design, blast radius — asks questions, produces contracts
    - security-consultant     # Auth, input handling, threat model — asks questions, produces security spec

  haiku:
    - docs-scraper            # Documentation scraping (speed > depth)
    - validator               # Test running + pass/fail reporting
    - agent-watchdog          # Background anomaly detection
    - health-checker          # CAF health checks — mechanical, no reasoning needed

# ─── Skill Overrides ────────────────────────────────────────────────

skill_default_models:
  test-generator: sonnet
  code-review: sonnet
  refactoring-assistant: sonnet
  security-scanner: sonnet
  error-analyzer: sonnet
  knowledge-db: haiku     # Mechanical DB ops, speed matters

# ─── Decision Matrix ────────────────────────────────────────────────

decision_matrix:
  - condition: "Coordination, orchestration, or architecture decisions"
    model: opus
  - condition: "Code generation, analysis, review, or research"
    model: sonnet
  - condition: "Mechanical validation, exploration, or data formatting"
    model: haiku
  - condition: "Unknown complexity"
    model: sonnet  # Default to capable workhorse
