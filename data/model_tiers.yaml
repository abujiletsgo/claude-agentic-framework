# Multi-Model Tier Configuration
# Max Plan: Opus everywhere that benefits from stronger reasoning.
# Haiku only for mechanical/validation tasks where speed > depth.
#
# Pricing irrelevant on Max plan — optimize for QUALITY not cost.

default_model: opus

# ─── Tier Definitions ───────────────────────────────────────────────

tiers:
  opus:
    model_id: claude-opus-4-6
    use_for:
      - Everything that benefits from reasoning
      - Orchestration, planning, architecture
      - Code generation and implementation
      - Research and analysis
      - Code review and refactoring
      - Security analysis
      - Agent/skill generation
      - Complex multi-step tasks

  haiku:
    model_id: claude-haiku-4-5
    use_for:
      - Read-only validation (syntax checks, linting)
      - Fast file exploration (Explore agent)
      - Documentation scraping
      - Data formatting and mechanical transforms
      - Status reporting and TTS summaries

# ─── Agent Assignments ──────────────────────────────────────────────
# Max Plan: 7 opus, 1 haiku. No sonnet tier needed.

agent_tiers:
  opus:
    - orchestrator            # Multi-agent coordination and planning
    - project-architect       # Architecture design, agent ecosystem creation
    - critical-analyst        # Deep critical thinking, risk analysis
    - researcher              # Research and analysis (upgraded from sonnet)
    - meta-agent              # Agent file generation (upgraded from sonnet)
    - scout-report-suggest    # Codebase scouting (upgraded from sonnet)
    - rlm-root                # Recursive exploration (upgraded from sonnet)

  haiku:
    - docs-scraper            # Documentation scraping (speed > depth)

# ─── Skill Overrides ────────────────────────────────────────────────

skill_default_models:
  test-generator: opus
  code-review: opus
  refactoring-assistant: opus
  security-scanner: opus
  error-analyzer: opus
  knowledge-db: haiku     # Mechanical DB ops, speed matters

# ─── Decision Matrix ────────────────────────────────────────────────

decision_matrix:
  - condition: "Any task requiring reasoning, analysis, or generation"
    model: opus
  - condition: "Mechanical validation, exploration, or data formatting"
    model: haiku
  - condition: "Unknown complexity"
    model: opus  # Default to strongest on Max plan
