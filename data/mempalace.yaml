wing: claude-agentic-framework
rooms:
- name: architecture
  description: Project structure, directory layout, file relationships, and dependency graph

- name: agents
  description: 12 specialized agents — orchestrator, builder, validator, researcher, debugger, project-architect, critical-analyst, meta-agent, scout-report-suggest, docs-scraper, agent-watchdog (rlm-root and solve removed — protocols folded into orchestrator)

- name: hooks
  description: 39 hooks across 16 event types — lifecycle automation, damage control, context management, fact extraction, memory writing

- name: skills
  description: 20 reusable skill packages — orchestrate, solve, test-generator, security-scanner, code-review, refactoring-assistant, and more

- name: commands
  description: 16 slash commands — commit, review, test, orchestrate, plan, prime, research, debug, fusion, rlm, and more

- name: confirmed-facts
  description: Verified project facts — architecture decisions, API behaviors, configuration requirements

- name: gotchas
  description: Known pitfalls, edge cases, and failure modes discovered during development

- name: paths
  description: Important file paths, directory conventions, and navigation landmarks

- name: patterns
  description: Recurring code patterns, conventions, and established approaches

- name: context-engineering
  description: Context window management — AAAK compression, compaction pipeline, auto-prime, bundle system

- name: knowledge-graph
  description: Temporal knowledge graph — fact sync, triple store, valid_from/ended lifecycle
